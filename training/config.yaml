# Space Debris Collision Risk Predictor - Training Configuration

# Data Paths
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  models_dir: "data/models"
  catalog_file: "data/raw/catalog.csv"
  positions_file: "data/processed/positions.h5"
  train_file: "data/processed/train.h5"
  val_file: "data/processed/val.h5"
  test_file: "data/processed/test.h5"

# TLE Data Sources
tle_sources:
  - name: "active"
    url: "https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=tle"
  - name: "debris"
    url: "https://celestrak.org/NORAD/elements/gp.php?GROUP=cosmos-2251-debris&FORMAT=tle"
  - name: "fengyun"
    url: "https://celestrak.org/NORAD/elements/gp.php?GROUP=fengyun-1c-debris&FORMAT=tle"
  - name: "iridium33"
    url: "https://celestrak.org/NORAD/elements/gp.php?GROUP=iridium-33-debris&FORMAT=tle"

# Propagation Settings
propagation:
  timestep_hours: 1
  horizon_hours: 168       # 7 days
  conjunction_threshold_km: 10.0  # miss distance threshold

# Feature Engineering
features:
  n_orbital: 12
  n_relative: 10
  n_physical: 5
  n_temporal: 3
  total: 30
  sequence_length: 168     # number of timesteps
  n_features_per_object: 6  # [x, y, z, vx, vy, vz]
  model_input_features: 22  # features fed to transformer per timestep

# Risk Thresholds
risk_thresholds:
  high: 0.001      # P > 1e-3 → HIGH
  medium: 0.0001   # 1e-4 < P <= 1e-3 → MEDIUM
  # below medium → LOW

# Model Architecture
model:
  d_model: 1024
  n_heads: 16
  n_encoder_layers: 10
  d_feedforward: 4096
  dropout: 0.1
  input_features: 22
  sequence_length: 168
  output_classes: 3     # LOW, MEDIUM, HIGH
  max_seq_len: 256

# Training Hyperparameters
training:
  batch_size: 256
  num_epochs: 50
  early_stopping_patience: 15
  gradient_clip_max_norm: 1.0
  num_workers: 4
  pin_memory: true
  mixed_precision: true

# Optimizer
optimizer:
  type: "AdamW"
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

# Scheduler
scheduler:
  type: "OneCycleLR"
  max_lr: 1.0e-3
  pct_start: 0.3
  anneal_strategy: "cos"
  div_factor: 10.0
  final_div_factor: 1.0e6

# Checkpointing
checkpoint:
  save_dir: "data/models"
  keep_best_n: 3
  metric: "val_auc"   # metric to track for best model
  mode: "max"         # maximize AUC

# Logging
logging:
  tensorboard_dir: "data/models/runs"
  log_every_n_steps: 50
  eval_every_n_epochs: 1

# Random Seed
seed: 42
